version: "3.8"
services:
  mongodb:
    image: mongo:6.0
    container_name: aeroguard-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: aeroguard-server
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/aeroguard
      - PORT=5000
    depends_on:
      - mongodb

volumes:
  mongodb_data:
